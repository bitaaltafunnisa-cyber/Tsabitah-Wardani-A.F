<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pesan Rahasia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(135deg,#0f172a,#312e81,#7c3aed,#ec4899);
    position:relative;
}

/* glow background */
body::before,
body::after{
    content:'';
    position:absolute;
    width:350px;
    height:350px;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.45;
}

body::before{
    background:#8b5cf6;
    top:-100px;
    left:-100px;
}

body::after{
    background:#ff4ecd;
    bottom:-100px;
    right:-100px;
}

.card{
    width:90%;
    max-width:540px;
    padding:38px;
    border-radius:32px;
    background:rgba(255,255,255,0.10);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    text-align:center;
    color:white;
    z-index:2;
    animation:muncul 1s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(40px) scale(0.9);
    }
    to{
        opacity:1;
        transform:translateY(0) scale(1);
    }
}

.icon{
    font-size:75px;
    margin-bottom:10px;
    animation:float 3s ease-in-out infinite;
}

@keyframes float{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-12px);}
    100%{transform:translateY(0px);}
}

h1{
    font-size:2.8rem;
    font-weight:700;
    margin-bottom:10px;
    background:linear-gradient(to right,#ffffff,#f9a8d4);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.subtitle{
    opacity:0.9;
    margin-bottom:25px;
    line-height:1.7;
    font-size:15px;
}

textarea,
input{
    width:100%;
    padding:17px;
    margin-top:15px;
    border:none;
    outline:none;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    color:white;
    font-size:15px;
    border:1px solid rgba(255,255,255,0.15);
    transition:0.3s;
}

textarea:focus,
input:focus{
    border:1px solid #f472b6;
    box-shadow:0 0 15px rgba(244,114,182,0.4);
}

textarea::placeholder,
input::placeholder{
    color:#ececec;
}

button{
    width:100%;
    padding:16px;
    margin-top:18px;
    border:none;
    border-radius:20px;
    background:
    linear-gradient(135deg,#ec4899,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px) scale(1.02);
    box-shadow:0 10px 25px rgba(236,72,153,0.35);
}

.output{
    margin-top:18px;
    min-height:85px;
    padding:18px;
    border-radius:22px;
    background:rgba(255,255,255,0.10);
    text-align:left;
    line-height:1.8;
    word-wrap:break-word;
    border:1px solid rgba(255,255,255,0.12);
    font-size:16px;
    animation:fade 0.5s;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.label{
    margin-top:20px;
    margin-bottom:5px;
    font-size:14px;
    opacity:0.85;
    text-align:left;
}

.footer{
    margin-top:22px;
    font-size:13px;
    opacity:0.7;
    letter-spacing:1px;
}

</style>
</head>

<body>

<div class="card">

<div class="icon">🔐</div>

<h1>Pesan Rahasia</h1>

<p class="subtitle">
Kirim pesan rahasia yang hanya bisa dibuka
menggunakan kata kunci spesial ✨
</p>

<textarea
id="messageInput"
rows="5"
placeholder="Tulis pesan rahasiamu..."
></textarea>

<button onclick="encryptMessage()">
🔒 Rahasiakan Pesan
</button>

<div class="label">Kode Rahasia</div>

<div class="output" id="encryptedOutput">
Kode rahasia akan muncul di sini...
</div>

<input
type="password"
id="keyInput"
placeholder="Masukkan kata kunci"
>

<button onclick="decryptMessage()">
🔓 Buka Pesan
</button>

<div class="label">Pesan Asli</div>

<div class="output" id="realMessage">
Pesan asli akan muncul di sini...
</div>

<div class="footer">
Kelompok 4 • Website Interaktif Modern
</div>

</div>

<script>

let originalMessage = "";

// kata kunci
const secretKey = "i love you";

// ubah pesan jadi emoji rahasia
function encryptMessage(){

    const input =
    document.getElementById("messageInput").value;

    // menyimpan pesan asli
    originalMessage = input;

    const emojis = [
        "💜","✨","🌸","🦋","🌙",
        "💎","🎀","☁️","💫","🧸",
        "🌈","⚡","🍓","🔥","🎵"
    ];

    let secretEmoji = "";

    for(let i = 0; i < input.length; i++){

        secretEmoji +=
        emojis[Math.floor(Math.random() * emojis.length)] + " ";
    }

    // tampilkan emoji rahasia
    document.getElementById("encryptedOutput")
    .innerHTML =
    "🔒 " + secretEmoji;

    // hapus pesan asli dari textarea
    document.getElementById("messageInput").value = "";

    speak("Pesan berhasil dirahasiakan");
}

// buka pesan asli
function decryptMessage(){

    const key =
    document.getElementById("keyInput").value.toLowerCase();

    if(key === secretKey){

        document.getElementById("realMessage")
        .innerHTML =
        "💌 " + originalMessage;

        speak("Pesan berhasil dibuka");

    }else{

        document.getElementById("realMessage")
        .innerHTML =
        "❌ Kata kunci salah";

        speak("Kata kunci salah");
    }
}

// speaker suara
function speak(text){

    const speech =
    new SpeechSynthesisUtterance(text);

    speech.lang = "id-ID";
    speech.rate = 1;

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
