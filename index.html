<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pesan Rahasia</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    linear-gradient(135deg,#5f2c82,#49a09d);
    position:relative;
}

/* background glow */
.blur1,
.blur2{
    position:absolute;
    border-radius:50%;
    filter:blur(90px);
    opacity:0.5;
}

.blur1{
    width:300px;
    height:300px;
    background:#ff4ecd;
    top:-100px;
    left:-100px;
}

.blur2{
    width:250px;
    height:250px;
    background:#6c63ff;
    bottom:-80px;
    right:-80px;
}

.card{
    width:90%;
    max-width:520px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
    text-align:center;
    color:white;
    z-index:2;
    animation:muncul 1s ease;
}

@keyframes muncul{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.icon{
    font-size:70px;
    margin-bottom:10px;
    animation:goyang 3s infinite;
}

@keyframes goyang{
    0%{transform:translateY(0px);}
    50%{transform:translateY(-10px);}
    100%{transform:translateY(0px);}
}

h1{
    font-size:2.5rem;
    margin-bottom:10px;
}

.subtitle{
    opacity:0.9;
    margin-bottom:25px;
    line-height:1.6;
}

textarea,
input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:18px;
    margin-top:14px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

textarea::placeholder,
input::placeholder{
    color:#f0f0f0;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:18px;
    margin-top:16px;
    background:linear-gradient(135deg,#ff4ecd,#7f5cff);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.02);
    box-shadow:0 8px 20px rgba(255,255,255,0.25);
}

.output{
    margin-top:18px;
    min-height:80px;
    padding:18px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    text-align:left;
    word-wrap:break-word;
    line-height:1.7;
    border:1px solid rgba(255,255,255,0.15);
}

.label{
    margin-top:18px;
    font-size:14px;
    opacity:0.85;
    text-align:left;
}

.footer{
    margin-top:20px;
    font-size:13px;
    opacity:0.7;
}

</style>
</head>

<body>

<div class="blur1"></div>
<div class="blur2"></div>

<div class="card">

<div class="icon">🔐</div>

<h1>Pesan Rahasia</h1>

<p class="subtitle">
Ketik pesan rahasiamu lalu ubah menjadi kode agar tidak bisa dibaca orang lain ✨
</p>

<textarea
id="messageInput"
rows="5"
placeholder="Tulis pesan rahasiamu..."
></textarea>

<button onclick="encryptMessage()">
🔒 Rahasiakan Pesan
</button>

<div class="label">Kode Rahasia</div>

<div class="output" id="encryptedOutput">
Kode rahasia akan muncul di sini...
</div>

<input
type="password"
id="keyInput"
placeholder="Masukkan kata kunci"
>

<button onclick="decryptMessage()">
🔓 Buka Pesan
</button>

<div class="label">Pesan Asli</div>

<div class="output" id="realMessage">
Pesan asli akan muncul di sini...
</div>

<div class="footer">
Kelompok 4 • Website Interaktif Modern
</div>

</div>

<script>

let originalMessage = "";

// password
const secretKey = "i love you";

// mengubah pesan jadi kode rahasia
function encryptMessage(){

    const input =
    document.getElementById("messageInput").value;

    // encode pesan
    originalMessage = btoa(input);

    // tampilkan kode
    document.getElementById("encryptedOutput")
    .innerHTML =
    "🔒 " + originalMessage;

    // hapus pesan asli
    document.getElementById("messageInput").value = "";

    speak("Pesan berhasil dirahasiakan");
}

// membuka pesan
function decryptMessage(){

    const key =
    document.getElementById("keyInput").value.toLowerCase();

    if(key === secretKey){

        document.getElementById("realMessage")
        .innerHTML =
        "💌 " + atob(originalMessage);

        speak("Pesan berhasil dibuka");

    }else{

        document.getElementById("realMessage")
        .innerHTML =
        "❌ Kata kunci salah";

        speak("Kata kunci salah");
    }
}

// speaker suara
function speak(text){

    const speech =
    new SpeechSynthesisUtterance(text);

    speech.lang = "id-ID";
    speech.rate = 1;

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
