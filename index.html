<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ajakan Buang Sampah</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        text-align: center;
        background: linear-gradient(135deg, #2e7d32, #fdd835, #8d6e63);
        color: white;
        overflow: hidden;
    }

    h1 {
        margin-top: 80px;
        font-size: 2.5em;
    }

    p {
        font-size: 1.2em;
    }

    .container {
        margin-top: 50px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: 0.3s;
    }

    #yesBtn {
        background-color: #4caf50;
        color: white;
    }

    #noBtn {
        background-color: #d32f2f;
        color: white;
        position: absolute;
    }

    #message {
        margin-top: 30px;
        font-size: 1.5em;
        font-weight: bold;
    }

    .speaker {
        margin-top: 30px;
        cursor: pointer;
        font-size: 40px;
    }
</style>
</head>

<body>

<h1>🌱 Ayo Buang Sampah Pada Tempatnya! 🌱</h1>
<p>Lingkungan bersih, hidup pun lebih sehat 🌍</p>

<div class="container">
    <button id="yesBtn">Mau</button>
    <button id="noBtn">Tidak</button>

    <div id="message"></div>

    <div class="speaker" onclick="playVoice()">🔊</div>
</div>

<script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const message = document.getElementById("message");

    // Tombol "Mau"
    yesBtn.onclick = () => {
        message.innerHTML = "Keren! Kamu peduli lingkungan 🌿✨";
        message.style.color = "#fff176";
    };

    // Tombol "Tidak" kabur
    noBtn.onmouseover = () => {
        moveButton();
    };

    noBtn.onclick = () => {
        moveButton();
    };

    function moveButton() {
        const x = Math.random() * (window.innerWidth - 100);
        const y = Math.random() * (window.innerHeight - 50);

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    // Speaker (Text to Speech)
    function playVoice() {
        const text = "Ayo buang sampah pada tempatnya. Lingkungan bersih, hidup sehat!";
        const speech = new SpeechSynthesisUtterance(text);
        speech.lang = "id-ID";
        speech.pitch = 1;
        speech.rate = 1;

        window.speechSynthesis.speak(speech);
    }
</script>

</body>
</html>
